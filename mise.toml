[env]
_.file = [".env.repo"]

# Workspace root
PKGBUILDS_ROOT = "{{ config_root }}"

# Repo metadata
REPO_NAME = "{{ get_env(name='REPO_NAME', default='openarsenal') }}"
REPO_BASE = "{{ get_env(name='REPO_BASE', default='/srv/pacman/repos') }}"
# Use CachyOS arch by default (overrideable)
REPO_ARCH = "{{ get_env(name='REPO_ARCH', default='x86_64_v3') }}"
# Repo dir that gets provisioned + used as PKGDEST
REPO_DIR  = "{{ get_env(name='REPO_DIR', default=env.REPO_BASE ~ '/' ~ env.REPO_NAME ~ '/' ~ env.REPO_ARCH) }}"
# Keep REPO_ROOT if you want, but it should equal REPO_DIR (or drop it entirely)
REPO_ROOT = "{{ get_env(name='REPO_ROOT', default=env.REPO_DIR) }}"
REPO_DB   = "{{ get_env(name='REPO_DB', default=env.REPO_DIR ~ '/' ~ env.REPO_NAME ~ '.db.tar.gz') }}"
PKGDEST = "{{ get_env(name='PKGDEST', default=env.REPO_DIR) }}"

# Signing
GNUPGHOME = "{{env.PKGBUILDS_ROOT}}/.gnupg"

# Chroot environment
# Chroot naming/location
CHROOT_NAME = "{{ get_env(name='CHROOT_NAME', default='cachyos-x86_64_v3') }}"
CHROOT_BASE = "{{ get_env(name='CHROOT_BASE', default='/var/lib/archbuild') }}"

# Directory that contains "root/"
CHROOT_DIR  = "{{ get_env(name='CHROOT_DIR', default=env.CHROOT_BASE ~ '/' ~ env.CHROOT_NAME) }}"

# The actual chroot filesystem root (mkarchroot target)
CHROOT_ROOT = "{{ get_env(name='CHROOT_ROOT', default=env.CHROOT_DIR ~ '/root') }}"

# Devtools pacman conf for chroot
CHROOT_PACMAN_CONF = "{{ get_env(name='CHROOT_PACMAN_CONF', default='/etc/pacman.conf') }}"

CHROOT_MIRRORLIST_V3 = "{{ get_env(name='CHROOT_MIRRORLIST_V3', default='/etc/pacman.d/cachyos-v3-mirrorlist') }}"
CHROOT_MIRRORLIST    = "{{ get_env(name='CHROOT_MIRRORLIST', default='/etc/pacman.d/cachyos-mirrorlist') }}"
ARCH_MIRRORLIST      = "{{ get_env(name='ARCH_MIRRORLIST', default='/etc/pacman.d/mirrorlist') }}"

# Scripts
SCRIPTS = "{{env.PKGBUILDS_ROOT}}/scripts"

# Repo automation inputs
FEEDS_JSON = "{{env.PKGBUILDS_ROOT}}/feeds.json"
AURDEST    = "{{env.PKGBUILDS_ROOT}}"

# Packager metadata
PACKAGER = "{{ get_env(name='PACKAGER', default='OpenArsenal Contributors <cachyos(at)openarsenal(dot)com>') }}"

# Reproducible timestamps
# (mimics: git log -1 --format=%ct || date -u +%s)
SOURCE_DATE_EPOCH = "{{ exec(command='sh -lc \"(git -C \\\"' ~ env.PKGBUILDS_ROOT ~ '\\\" log -1 --format=%ct 2>/dev/null || date -u +%s) | tr -cd 0-9\"') | trim }}"

[tasks.default]
description = "List available tasks"
run = "mise tasks"

[tasks."aur:import"]
description = "Clone a package from the AUR and add it to the feeds.json file for updates"
run = 'bash "{{env.SCRIPTS}}/aur-imports.sh"'

[tasks.update]
description = "Update PKGBUILDs (feeds/AUR/etc) without building"
run = 'bash "{{env.SCRIPTS}}/update-pkg.sh"'
